<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Textback — Mr Clarke's messaging overlay for films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; background:#0a0a0a; overflow:hidden; font-family: Inter, system-ui, sans-serif; }
  #root { position:absolute; inset:0; }
  #export-stage { position: fixed; left: -99999px; top: 0; width: 1280px; height: 720px; pointer-events: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
<div id="root"></div>
<div id="export-stage"></div>

<!-- ═══════════════════════════════════════════════════════════════════
     animations.jsx — Stage, easing helpers, Sprite, PlaybackBar
     ═══════════════════════════════════════════════════════════════════ -->
<script type="text/babel">
const Easing = {
  linear: (t) => t,
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,
  easeOutBack: (t) => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); },
  easeInBack: (t) => { const c1 = 1.70158, c3 = c1 + 1; return c3 * t * t * t - c1 * t * t; },
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0; if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        return output[i] + (output[i + 1] - output[i]) * easeFn(local);
      }
    }
    return output[output.length - 1];
  };
}

function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    return from + (to - from) * ease((t - start) / (end - start));
  };
}

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;
  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration) ? clamp(localTime / duration, 0, 1) : 0;
  const value = { localTime, progress, duration, visible };
  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

function Stage({ width = 1280, height = 720, duration = 10, background = '#f6f4ef', loop = true, autoplay = true, persistKey = 'animstage', children }) {
  const [time, setTime] = React.useState(() => {
    try { const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0'); return isFinite(v) ? clamp(v, 0, duration) : 0; } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);
  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44;
      const s = Math.min(el.clientWidth / width, (el.clientHeight - barH) / height);
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) { lastTsRef.current = null; return; }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); lastTsRef.current = null; };
  }, [playing, duration, loop]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') { e.preventDefault(); setPlaying(p => !p); }
      else if (e.code === 'ArrowLeft') setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.code === 'ArrowRight') setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.key === '0' || e.code === 'Home') setTime(0);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;
  const ctxValue = React.useMemo(() => ({ time: displayTime, duration, playing, setTime, setPlaying }), [displayTime, duration, playing]);

  return (
    <div ref={stageRef} style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', background:'#0a0a0a', fontFamily:'Inter, system-ui, sans-serif' }}>
      <div style={{ flex:1, width:'100%', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', minHeight:0 }}>
        <div ref={canvasRef} style={{ width, height, background, position:'relative', transform:`scale(${scale})`, transformOrigin:'center', flexShrink:0, boxShadow:'0 20px 60px rgba(0,0,0,0.4)', overflow:'hidden' }}>
          <TimelineContext.Provider value={ctxValue}>{children}</TimelineContext.Provider>
        </div>
      </div>
      <PlaybackBar time={displayTime} actualTime={time} duration={duration} playing={playing}
        onPlayPause={() => setPlaying(p => !p)} onReset={() => setTime(0)}
        onSeek={(t) => setTime(t)} onHover={(t) => setHoverTime(t)} />
    </div>
  );
}

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    return clamp((e.clientX - rect.left) / rect.width, 0, 1) * duration;
  }, [duration]);
  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    if (dragging) onSeek(timeFromEvent(e)); else onHover(timeFromEvent(e));
  };
  const onTrackDown = (e) => { setDragging(true); onSeek(timeFromEvent(e)); onHover(null); };
  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => { if (trackRef.current) onSeek(timeFromEvent(e)); };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mouseup', onUp); window.removeEventListener('mousemove', onMove); };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => { const total = Math.max(0, t); const m = Math.floor(total/60); const s = Math.floor(total%60); const cs = Math.floor((total*100)%100); return `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`; };
  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{ display:'flex', alignItems:'center', gap:12, padding:'8px 16px', background:'rgba(20,20,20,0.92)', borderTop:'1px solid rgba(255,255,255,0.08)', width:'100%', maxWidth:680, alignSelf:'center', borderRadius:8, color:'#f6f4ef', fontFamily:'Inter, system-ui, sans-serif', userSelect:'none', flexShrink:0 }}>
      <IconButton onClick={onReset} title="Return to start">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/></svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="2" width="3" height="10" fill="currentColor"/><rect x="8" y="2" width="3" height="10" fill="currentColor"/></svg>
          : <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2l9 5-9 5V2z" fill="currentColor"/></svg>}
      </IconButton>
      <div style={{ fontFamily:mono, fontSize:12, fontVariantNumeric:'tabular-nums', width:64, textAlign:'right', color:'#f6f4ef' }}>{fmt(time)}</div>
      <div ref={trackRef} onMouseMove={onTrackMove} onMouseLeave={() => { if (!dragging) onHover(null); }} onMouseDown={onTrackDown}
        style={{ flex:1, height:22, position:'relative', cursor:'pointer', display:'flex', alignItems:'center' }}>
        <div style={{ position:'absolute', left:0, right:0, height:4, background:'rgba(255,255,255,0.12)', borderRadius:2 }}/>
        <div style={{ position:'absolute', left:0, width:`${pct}%`, height:4, background:'oklch(72% 0.12 250)', borderRadius:2 }}/>
        <div style={{ position:'absolute', left:`${pct}%`, top:'50%', width:12, height:12, marginLeft:-6, marginTop:-6, background:'#fff', borderRadius:6, boxShadow:'0 2px 4px rgba(0,0,0,0.4)' }}/>
      </div>
      <div style={{ fontFamily:mono, fontSize:12, fontVariantNumeric:'tabular-nums', width:64, textAlign:'left', color:'rgba(246,244,239,0.55)' }}>{fmt(duration)}</div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} title={title} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ width:28, height:28, display:'flex', alignItems:'center', justifyContent:'center', background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:6, color:'#f6f4ef', cursor:'pointer', padding:0, transition:'background 120ms' }}>
      {children}
    </button>
  );
}

Object.assign(window, { Easing, interpolate, animate, clamp, TimelineContext, useTime, useTimeline, Sprite, SpriteContext, useSprite, Stage, PlaybackBar, IconButton });
</script>

<!-- ═══════════════════════════════════════════════════════════════════
     scene.jsx — chat scene, sound engine, timeline, updated with
     image bubbles and undelivered indicator support
     ═══════════════════════════════════════════════════════════════════ -->
<script type="text/babel">
const BUBBLE_FONT = '"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';

class SoundEngine {
  constructor() { this.ctx = null; this.master = null; this.volume = 0.6; this.muted = false; }
  ensure() {
    if (this.ctx) return this.ctx;
    const C = window.AudioContext || window.webkitAudioContext;
    if (!C) return null;
    this.ctx = new C();
    this.master = this.ctx.createGain();
    this.master.gain.value = this.volume;
    this.master.connect(this.ctx.destination);
    return this.ctx;
  }
  setVolume(v) { this.volume = v; if (this.master) this.master.gain.value = v; }
  setMuted(m) { this.muted = m; if (this.master) this.master.gain.value = m ? 0 : this.volume; }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
  _tone({ freq, dur = 0.18, type = 'sine', when = 0, gain = 0.4, attack = 0.005, release = 0.12, freqEnd = null }) {
    const ctx = this.ensure(); if (!ctx) return;
    const t0 = ctx.currentTime + Math.max(0, when);
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (freqEnd != null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain, t0 + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur + release);
    osc.connect(g); g.connect(this.master);
    osc.start(t0); osc.stop(t0 + dur + release + 0.02);
  }
  send(when = 0) {
    if (this.muted) return;
    this._tone({ freq:520, freqEnd:880, dur:0.09, type:'sine', gain:0.22, attack:0.003, release:0.08, when });
    this._tone({ freq:780, freqEnd:1320, dur:0.07, type:'triangle', gain:0.09, attack:0.003, release:0.06, when: when+0.01 });
  }
  receive(when = 0) {
    if (this.muted) return;
    this._tone({ freq:880, dur:0.12, type:'sine', gain:0.18, attack:0.005, release:0.18, when });
    this._tone({ freq:1318, dur:0.18, type:'sine', gain:0.22, attack:0.005, release:0.28, when: when+0.06 });
    this._tone({ freq:1760, dur:0.1, type:'triangle', gain:0.05, attack:0.003, release:0.12, when: when+0.06 });
  }
  tick(when = 0) {
    if (this.muted) return;
    this._tone({ freq:1600, dur:0.015, type:'square', gain:0.04, attack:0.001, release:0.02, when });
  }
}

function computeTimeline(conversation, opts) {
  const { charsPerSecond, typingDelay, streamDelay, tailSeconds = 2.0, firstDelay = 0.4 } = opts;
  let cursor = firstDelay;
  const out = [];
  for (let i = 0; i < conversation.length; i++) {
    const m = conversation[i];
    const gap = m.delay != null ? m.delay : 0.6;
    cursor += i === 0 ? 0 : gap;
    const isUser = m.side === 'user';
    const isImage = !!m.imageData;
    let typingStart = null, typingEnd = null, streamStart = null, end, textDone;
    const start = cursor;

    if (isImage) {
      // Image bubbles: appear as a whole, no streaming
      textDone = cursor + 0.3;
      end = cursor + 0.5;
    } else if (m.streamed) {
      if (isUser) {
        streamStart = cursor;
        const streamDur = (m.text || '').length / charsPerSecond;
        textDone = streamStart + streamDur;
        end = textDone + 0.3;
      } else {
        typingStart = cursor;
        typingEnd = cursor + typingDelay;
        streamStart = typingEnd + streamDelay;
        const streamDur = (m.text || '').length / charsPerSecond;
        textDone = streamStart + streamDur;
        end = textDone + 0.3;
      }
    } else {
      textDone = cursor + 0.2;
      end = cursor + 0.4;
    }
    out.push({ ...m, start, typingStart, typingEnd, streamStart, end, textDone });
    cursor = end;
  }
  return { messages: out, totalDuration: cursor + tailSeconds };
}

function Avatar({ color, initial, imageUrl, size = 36 }) {
  if (imageUrl) {
    return (
      <div style={{ width:size, height:size, borderRadius:size/2, flexShrink:0, overflow:'hidden', background:color, boxShadow:'0 1px 2px rgba(0,0,0,0.15)' }}>
        <img src={imageUrl} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }}/>
      </div>
    );
  }
  return (
    <div style={{ width:size, height:size, borderRadius:size/2, background:color, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:BUBBLE_FONT, fontWeight:700, fontSize:size*0.42, flexShrink:0, boxShadow:'0 1px 2px rgba(0,0,0,0.15)' }}>
      {initial}
    </div>
  );
}

function Bubble({ children, side, bg, color, fontSize, entryProgress = 1, maxWidth = 580 }) {
  const scale = 0.86 + 0.14 * entryProgress;
  const opacity = entryProgress;
  const ty = (1 - entryProgress) * 10;
  const isUser = side === 'user';
  const radius = isUser ? '22px 22px 6px 22px' : '22px 22px 22px 6px';
  return (
    <div style={{ maxWidth, background:bg, color, padding:'12px 16px', borderRadius:radius, fontFamily:BUBBLE_FONT, fontSize, lineHeight:1.35, fontWeight:450, letterSpacing:'-0.005em', transform:`scale(${scale}) translateY(${ty}px)`, transformOrigin: isUser ? 'bottom right' : 'bottom left', opacity, willChange:'transform, opacity', boxShadow: isUser ? '0 1px 2px rgba(0,0,0,0.12)' : '0 1px 2px rgba(0,0,0,0.05)', wordBreak:'break-word' }}>
      {children}
    </div>
  );
}

function TypingDots({ time, color = '#8a8a90' }) {
  const dot = (i) => {
    const phase = (time * 2 + i * 0.18) % 1;
    const y = Math.sin(phase * Math.PI) * 4;
    const o = 0.45 + Math.sin(phase * Math.PI) * 0.45;
    return <div key={i} style={{ width:8, height:8, borderRadius:4, background:color, transform:`translateY(${-y}px)`, opacity:o }}/>;
  };
  return <div style={{ display:'flex', gap:5, padding:'4px 2px' }}>{dot(0)}{dot(1)}{dot(2)}</div>;
}

function StreamingText({ text, startAt, cps, time }) {
  const local = Math.max(0, time - startAt);
  let n = Math.min(Math.floor(local * cps), (text || '').length);
  const visible = (text || '').slice(0, n);
  const done = n >= (text || '').length;
  const started = local > 0;
  const caretOn = started && !done && (Math.floor(time * 2) % 2 === 0);
  return (
    <span>
      {visible}
      <span style={{ display:'inline-block', width:2, height:'1.05em', verticalAlign:'-0.15em', marginLeft:2, background:(started && !done) ? 'currentColor' : 'transparent', opacity: caretOn ? 0.85 : 0 }}/>
    </span>
  );
}

function TimeStamp({ label }) {
  return (
    <div style={{ alignSelf:'center', fontFamily:BUBBLE_FONT, fontSize:13, fontWeight:600, color:'#9a9aa0', letterSpacing:'0.02em', textTransform:'uppercase', padding:'6px 0 14px' }}>
      {label}
    </div>
  );
}

// "Not Delivered" indicator — iMessage-style red pill below a user bubble
function NotDeliveredBadge({ opacity }) {
  return (
    <div style={{ opacity, display:'flex', alignItems:'center', gap:5, color:'#ff3b30', fontSize:11, marginTop:3, justifyContent:'flex-end', fontFamily:BUBBLE_FONT, whiteSpace:'nowrap', flexShrink:0 }}>
      <div style={{ width:14, height:14, borderRadius:7, border:'1.5px solid #ff3b30', display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, fontWeight:800, lineHeight:1, flexShrink:0 }}>!</div>
      <span style={{ whiteSpace:'nowrap' }}>Not Delivered</span>
    </div>
  );
}

function ChatScene({ time, tweaks, timeline }) {
  const { userName, userColor, userAvatar, userTextColor, assistantName, assistantBg, assistantText, assistantColor, assistantAvatar, showUserAvatar, showAssistantAvatar, showTypingFirst, showTimestamp, timestampLabel, fontSize, charsPerSecond, avatarSize } = tweaks;
  const t = time;

  return (
    <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'flex-end', justifyContent:'center', padding:'60px 60px 80px' }}>
      <div style={{ width:'100%', maxWidth:820, display:'flex', flexDirection:'column', gap:12 }}>
        {showTimestamp && (
          <div style={{ opacity: Math.min(1, Math.max(0, t / 0.3)), display:'flex', justifyContent:'center' }}>
            <TimeStamp label={timestampLabel || 'Today · 3:42 PM'} />
          </div>
        )}

        {timeline.messages.map((m) => {
          if (t < m.start) return null;
          const isUser = m.side === 'user';
          const showAvatar = isUser ? showUserAvatar : showAssistantAvatar;
          const avName = isUser ? userName : assistantName;
          const avColor = isUser ? userColor : assistantColor;
          const avImg = isUser ? userAvatar : assistantAvatar;
          const isImage = !!m.imageData;

          // ── Image bubble ──────────────────────────────────────────────
          if (isImage) {
            const entry = Math.max(0, Math.min(1, (t - m.start) / 0.35));
            const bg = isUser ? userColor : assistantBg;
            const col = isUser ? userTextColor : assistantText;
            const undeliveredOpacity = m.undelivered ? Math.max(0, Math.min(1, (t - m.textDone) / 0.5)) : 0;
            const radius = isUser ? '22px 22px 6px 22px' : '22px 22px 22px 6px';
            const scl = 0.86 + 0.14 * entry;
            const ty = (1 - entry) * 10;
            return (
              <div key={m.id} style={{ display:'flex', flexDirection: isUser ? 'row-reverse' : 'row', alignItems:'flex-end', gap:10, opacity:entry }}>
                {showAvatar && <Avatar color={avColor} initial={(avName||'?')[0]} imageUrl={avImg} size={avatarSize}/>}
                <div style={{ display:'flex', flexDirection:'column', alignItems: isUser ? 'flex-end' : 'flex-start' }}>
                  <div style={{
                    background: bg,
                    borderRadius: radius,
                    overflow: 'hidden',
                    boxShadow: isUser ? '0 1px 2px rgba(0,0,0,0.12)' : '0 1px 2px rgba(0,0,0,0.05)',
                    transform: `scale(${scl}) translateY(${ty}px)`,
                    transformOrigin: isUser ? 'bottom right' : 'bottom left',
                    width: 300,
                    willChange: 'transform, opacity',
                  }}>
                    <img
                      src={m.imageData} alt={m.imageAlt || ''}
                      style={{ display:'block', width:'100%', height:'auto', maxHeight:360, objectFit:'cover' }}
                    />
                    {m.text ? (
                      <div style={{ padding:'10px 16px 12px', fontSize, color:col, fontFamily:BUBBLE_FONT, lineHeight:1.35, fontWeight:450 }}>
                        {m.text}
                      </div>
                    ) : null}
                  </div>
                  {undeliveredOpacity > 0 && <NotDeliveredBadge opacity={undeliveredOpacity}/>}
                </div>
              </div>
            );
          }

          // ── Non-streamed text bubble ───────────────────────────────────
          if (!m.streamed) {
            const entry = Math.max(0, Math.min(1, (t - m.start) / 0.35));
            const bg = isUser ? userColor : assistantBg;
            const col = isUser ? userTextColor : assistantText;
            const undeliveredOpacity = m.undelivered ? Math.max(0, Math.min(1, (t - m.textDone) / 0.5)) : 0;
            return (
              <div key={m.id} style={{ display:'flex', flexDirection: isUser ? 'row-reverse' : 'row', alignItems:'flex-end', gap:10, opacity:entry }}>
                {showAvatar && <Avatar color={avColor} initial={(avName||'?')[0]} imageUrl={avImg} size={avatarSize}/>}
                <div style={{ display:'flex', flexDirection:'column', alignItems: isUser ? 'flex-end' : 'flex-start' }}>
                  <Bubble side={m.side} bg={bg} color={col} fontSize={fontSize} entryProgress={entry}>{m.text}</Bubble>
                  {undeliveredOpacity > 0 && <NotDeliveredBadge opacity={undeliveredOpacity}/>}
                </div>
              </div>
            );
          }

          // ── Streamed USER bubble ──────────────────────────────────────
          if (isUser) {
            const entry = Math.max(0, Math.min(1, (t - m.start) / 0.3));
            const undeliveredOpacity = m.undelivered ? Math.max(0, Math.min(1, (t - m.textDone) / 0.5)) : 0;
            return (
              <div key={m.id} style={{ display:'flex', flexDirection:'row-reverse', alignItems:'flex-end', gap:10, opacity:entry }}>
                {showAvatar && <Avatar color={avColor} initial={(avName||'?')[0]} imageUrl={avImg} size={avatarSize}/>}
                <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end' }}>
                  <Bubble side="user" bg={userColor} color={userTextColor} fontSize={fontSize} entryProgress={entry}>
                    <StreamingText text={m.text} startAt={m.streamStart + 0.05} cps={charsPerSecond} time={t}/>
                  </Bubble>
                  {undeliveredOpacity > 0 && <NotDeliveredBadge opacity={undeliveredOpacity}/>}
                </div>
              </div>
            );
          }

          // ── Streamed ASSISTANT bubble (typing dots → text) ────────────
          const afterTyping = t >= m.streamStart;
          const typingEntry = Math.max(0, Math.min(1, (t - m.typingStart) / 0.25));
          const bubbleEntry = Math.max(0, Math.min(1, (t - m.streamStart) / 0.3));
          const asstUndeliveredOpacity = m.undelivered ? Math.max(0, Math.min(1, (t - m.textDone) / 0.5)) : 0;
          return (
            <div key={m.id} style={{ display:'flex', alignItems:'flex-end', gap:10, opacity: afterTyping ? bubbleEntry : typingEntry }}>
              {showAvatar && <Avatar color={avColor} initial={(avName||'?')[0]} imageUrl={avImg} size={avatarSize}/>}
              <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-start' }}>
                {!afterTyping && showTypingFirst && (
                  <div style={{ background:assistantBg, padding:'14px 18px', borderRadius:'22px 22px 22px 6px', transform:`scale(${0.88 + 0.12 * typingEntry})`, transformOrigin:'bottom left', boxShadow:'0 1px 2px rgba(0,0,0,0.05)' }}>
                    <TypingDots time={t}/>
                  </div>
                )}
                {afterTyping && (
                  <Bubble side="assistant" bg={assistantBg} color={assistantText} fontSize={fontSize} entryProgress={bubbleEntry}>
                    <StreamingText text={m.text} startAt={m.streamStart + 0.05} cps={charsPerSecond} time={t}/>
                  </Bubble>
                )}
                {asstUndeliveredOpacity > 0 && afterTyping && <NotDeliveredBadge opacity={asstUndeliveredOpacity}/>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { ChatScene, SoundEngine, computeTimeline, BUBBLE_FONT });
</script>

<script type="text/babel">

const inputStyle = { background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', color:'#f6f4ef', fontFamily:'inherit', fontSize:12, padding:'6px 8px', borderRadius:6, outline:'none' };

function AvatarField({ label, imageKey, colorKey, nameKey, values, setKey }) {
  const fileRef = React.useRef(null);
  const handleFile = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;

    <Field label={label}>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ width:38, height:38, borderRadius:19, flexShrink:0, background:values[colorKey], color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:16, overflow:'hidden', border:'1px solid rgba(255,255,255,0.1)' }}>
          {values[imageKey] ? <img src={values[imageKey]} style={{ width:'100%', height:'100%', objectFit:'cover' }}/> : (values[nameKey]||'?')[0]}
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:4, flex:1 }}>
          <input type="text" value={values[nameKey]} onChange={(e)=>setKey(nameKey, e.target.value)} placeholder="name" style={inputStyle}/>

}

function MessageEditor({ msg, index, total, onChange, onDelete, onMove }) {

  return (

      {/* Image upload */}
      <div style={{ display:'flex', gap:4, flexWrap:'wrap', alignItems:'center' }}>

          <button type="button" onClick={()=>onChange({...msg, imageData:null})} style={{ ...miniBtn, color:'#ff8a8a' }}>Remove image</button>

      </div>

        <img src={msg.imageData} alt="" style={{ width:'100%', maxHeight:90, objectFit:'cover', borderRadius:6, marginTop:2 }}/>

          )}
          <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:11, color:'#f6f4ef', cursor:'pointer' }} title="Shows a 'Not Delivered' indicator below the message">
            <input type="checkbox" checked={!!msg.undelivered} onChange={(e)=>onChange({...msg, undelivered:e.target.checked})}/>
            <span style={{ color:'#ff8a8a' }}>Not delivered</span>
          </label>
        </div>
      </div>
    </div>
  );
}

function useDraggable(defaultPos) {
  const [pos, setPos] = React.useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('tweaksPanelPos') || 'null');
      if (saved && typeof saved.x === 'number') return saved;
    } catch {}
    return defaultPos;
  });
  const dragRef = React.useRef(null);
  const onMouseDown = (e) => {
    e.preventDefault();
    const start = { x:e.clientX, y:e.clientY, px:pos.x, py:pos.y };
    const onMove = (ev) => {
      const nx = Math.max(0, Math.min(window.innerWidth - 80, start.px + (ev.clientX - start.x)));
      const ny = Math.max(0, Math.min(window.innerHeight - 40, start.py + (ev.clientY - start.y)));
      setPos({ x:nx, y:ny });
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      try { localStorage.setItem('tweaksPanelPos', JSON.stringify(dragRef.current)); } catch {}
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
  dragRef.current = pos;
  return { pos, onMouseDown };
}

function TweaksPanel({ initial, onChange, onPlaySample }) {
  const [values, setValues] = React.useState(initial);
  const [collapsed, setCollapsed] = React.useState(false);
  const { pos, onMouseDown } = useDraggable({ x: window.innerWidth - 356, y: 16 });

  const setKey = (k, v) => {
    const next = { ...values, [k]: v };
    setValues(next);
    onChange(next);
    try { window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [k]: v } }, '*'); } catch {}
  };

  const updateMsg = (i, msg) => { const c = values.conversation.slice(); c[i] = msg; setKey('conversation', c); };
  const deleteMsg = (i) => { const c = values.conversation.slice(); c.splice(i, 1); setKey('conversation', c); };
  const moveMsg = (i, dir) => { const c = values.conversation.slice(); const j = i+dir; if (j<0||j>=c.length) return; [c[i],c[j]]=[c[j],c[i]]; setKey('conversation', c); };
  const addMsg = (side) => {
    const c = values.conversation.slice();
    c.push({ id:'m'+Date.now(), side, text: side==='user' ? 'New message' : 'New reply…', streamed: side==='assistant', delay:0.8, imageData:null, undelivered:false });
    setKey('conversation', c);
  };

  return (
    <div style={{ position:'fixed', left:pos.x, top:pos.y, width:340, maxHeight: collapsed ? 44 : `calc(100vh - ${pos.y+16}px)`, background:'rgba(18,18,22,0.96)', color:'#f6f4ef', border:'1px solid rgba(255,255,255,0.1)', borderRadius:12, display:'flex', flexDirection:'column', boxShadow:'0 20px 60px rgba(0,0,0,0.5)', zIndex:1000, fontFamily:'Inter, system-ui, sans-serif', overflow:'hidden' }}>
      <div onMouseDown={onMouseDown} style={{ padding:'10px 14px', cursor:'grab', userSelect:'none', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom: collapsed ? 'none' : '1px solid rgba(255,255,255,0.06)', background:'rgba(255,255,255,0.02)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, fontWeight:700, letterSpacing:'-0.01em' }}>
          <span style={{ opacity:0.4, fontSize:12 }}>⋮⋮</span> Tweaks
        </div>
        <button type="button" onMouseDown={(e)=>e.stopPropagation()} onClick={()=>setCollapsed(c=>!c)} style={{ ...miniBtn, padding:'2px 8px' }}>
          {collapsed ? '▾' : '▴'}
        </button>
      </div>

      {!collapsed && (
        <div style={{ padding:14, display:'flex', flexDirection:'column', gap:12, overflowY:'auto' }}>
          <Section title="Conversation">
            {values.conversation.map((m, i) => (
              <MessageEditor key={m.id} msg={m} index={i} total={values.conversation.length}
                onChange={(next)=>updateMsg(i, next)} onDelete={deleteMsg} onMove={moveMsg}/>
            ))}
            <div style={{ display:'flex', gap:6 }}>
              <button type="button" style={miniBtn} onClick={()=>addMsg('user')}>+ User msg</button>
              <button type="button" style={miniBtn} onClick={()=>addMsg('assistant')}>+ Assistant msg</button>
            </div>
          </Section>

          <Section title="People">
            <AvatarField label="User" nameKey="userName" colorKey="userColor" imageKey="userAvatar" values={values} setKey={setKey}/>
            <Field label="User text color">
              <input type="color" value={values.userTextColor} onChange={(e)=>setKey('userTextColor', e.target.value)} style={{ ...inputStyle, padding:2, height:28 }}/>
            </Field>
            <AvatarField label="Assistant" nameKey="assistantName" colorKey="assistantColor" imageKey="assistantAvatar" values={values} setKey={setKey}/>
            <Row cols={2}>
              <Field label="Reply bubble bg">
                <input type="color" value={values.assistantBg} onChange={(e)=>setKey('assistantBg', e.target.value)} style={{ ...inputStyle, padding:2, height:28 }}/>
              </Field>
              <Field label="Reply text color">
                <input type="color" value={values.assistantText} onChange={(e)=>setKey('assistantText', e.target.value)} style={{ ...inputStyle, padding:2, height:28 }}/>
              </Field>
            </Row>
            <Row cols={2}>
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:12 }}>
                <input type="checkbox" checked={values.showUserAvatar} onChange={(e)=>setKey('showUserAvatar', e.target.checked)}/> User avatar
              </label>
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:12 }}>
                <input type="checkbox" checked={values.showAssistantAvatar} onChange={(e)=>setKey('showAssistantAvatar', e.target.checked)}/> Reply avatar
              </label>
            </Row>
          </Section>

          <Section title="Pacing & layout">
            <Field label={`Streaming speed: ${values.charsPerSecond} chars/sec`}>
              <input type="range" min={6} max={80} step={1} value={values.charsPerSecond} onChange={(e)=>setKey('charsPerSecond', Number(e.target.value))}/>
            </Field>
            <Row cols={2}>
              <Field label={`Typing: ${values.typingDelay.toFixed(1)}s`}>
                <input type="range" min={0} max={3} step={0.1} value={values.typingDelay} onChange={(e)=>setKey('typingDelay', Number(e.target.value))}/>
              </Field>
              <Field label={`Stream gap: ${values.streamDelay.toFixed(1)}s`}>
                <input type="range" min={0} max={2} step={0.1} value={values.streamDelay} onChange={(e)=>setKey('streamDelay', Number(e.target.value))}/>
              </Field>
            </Row>
            <Row cols={2}>
              <Field label={`Font size: ${values.fontSize}px`}>
                <input type="range" min={14} max={36} step={1} value={values.fontSize} onChange={(e)=>setKey('fontSize', Number(e.target.value))}/>
              </Field>
              <Field label={`Avatar: ${values.avatarSize}px`}>
                <input type="range" min={24} max={64} step={2} value={values.avatarSize} onChange={(e)=>setKey('avatarSize', Number(e.target.value))}/>
              </Field>
            </Row>
            <Row cols={2}>
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:12 }}>
                <input type="checkbox" checked={values.showTypingFirst} onChange={(e)=>setKey('showTypingFirst', e.target.checked)}/> Typing dots
              </label>
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:12 }}>
                <input type="checkbox" checked={values.showTimestamp} onChange={(e)=>setKey('showTimestamp', e.target.checked)}/> Timestamp
              </label>
            </Row>
            {values.showTimestamp && (
              <Field label="Timestamp label">
                <input type="text" value={values.timestampLabel} onChange={(e)=>setKey('timestampLabel', e.target.value)} style={inputStyle}/>
              </Field>
            )}
          </Section>

          <Section title="Canvas">
            <Field label="Background">
              <select value={values.canvasBg} onChange={(e)=>setKey('canvasBg', e.target.value)} style={inputStyle}>
                <option value="transparent">Transparent (overlay)</option>
                <option value="#ffffff">White</option>
                <option value="#f5f5f7">Light gray</option>
                <option value="#0a0a0a">Black</option>
                <option value="#1a1a1f">Dark</option>
              </select>
            </Field>
          </Section>

          <Section title="Sound">
            <Row cols={2}>
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:12 }}>
                <input type="checkbox" checked={values.soundOn} onChange={(e)=>setKey('soundOn', e.target.checked)}/> Sound on
              </label>
              <button type="button" style={miniBtn} onClick={onPlaySample}>Preview chime</button>
            </Row>
            <Field label={`Volume: ${Math.round(values.volume*100)}%`}>
              <input type="range" min={0} max={1} step={0.05} value={values.volume} onChange={(e)=>setKey('volume', Number(e.target.value))}/>
            </Field>
          </Section>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { TweaksPanel });
</script>

  const firedRef = React.useRef(new Set());
  const lastTimeRef = React.useRef(0);
  React.useEffect(() => { engine.setVolume(tweaks.volume); engine.setMuted(!tweaks.soundOn); }, [tweaks.volume, tweaks.soundOn, engine]);
  React.useEffect(() => {
    if (!playing) return;
    let raf;
    const tick = () => {
      const t = timeRef.current;
      const lt = lastTimeRef.current;
      if (t + 0.02 < lt) firedRef.current.clear();
      lastTimeRef.current = t;
      for (const m of timeline.messages) {
        if (m.side === 'user') {
          const key = `u:${m.id}`;
          if (!firedRef.current.has(key) && t >= m.start && t - m.start < 0.2) {
            firedRef.current.add(key); engine.resume(); engine.send();
          }
        } else {
          const cue = m.streamStart != null ? m.streamStart : m.start;
          const key = `a:${m.id}`;
          if (!firedRef.current.has(key) && t >= cue && t - cue < 0.2) {
            firedRef.current.add(key); engine.resume(); engine.receive();
          }
        }
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [playing, timeline, engine, timeRef]);
}

function PreviewStage({ tweaks, timeline, engine }) {
  const timeRef = React.useRef(0);
  const [playing, setPlaying] = React.useState(true);
  function SceneFromCtx() {
    const time = useTime();
    timeRef.current = time;
    return <ChatScene time={time} tweaks={tweaks} timeline={timeline}/>;
  }
  useSoundScheduler(engine, timeline, tweaks, timeRef, playing);
  return (
    <Stage width={1280} height={720} duration={timeline.totalDuration} background={tweaks.canvasBg === 'transparent' ? 'transparent' : tweaks.canvasBg} persistKey="chatstream">
      {tweaks.canvasBg === 'transparent' && (
        <div style={{ position:'absolute', inset:0, backgroundImage:'linear-gradient(45deg, rgba(0,0,0,0.06) 25%, transparent 25%), linear-gradient(-45deg, rgba(0,0,0,0.06) 25%, transparent 25%), linear-gradient(45deg, transparent 75%, rgba(0,0,0,0.06) 75%), linear-gradient(-45deg, transparent 75%, rgba(0,0,0,0.06) 75%)', backgroundSize:'24px 24px', backgroundPosition:'0 0, 0 12px, 12px -12px, -12px 0', backgroundColor:'#f5f5f7', pointerEvents:'none' }}/>
      )}
      <SceneFromCtx/>
    </Stage>
  );
}

function ExportModal({ open, onClose, tweaks, timeline }) {
  const [fps, setFps] = React.useState(30);
  const [transparent, setTransparent] = React.useState(true);
  const [running, setRunning] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const [status, setStatus] = React.useState('');
  const cancelRef = React.useRef(false);
  if (!open) return null;
  const totalFrames = Math.max(1, Math.ceil(timeline.totalDuration * fps));

  const runExport = async () => {
    setRunning(true); setProgress(0); setStatus('Preparing…'); cancelRef.current = false;
    const stageEl = document.getElementById('export-stage');
    stageEl.innerHTML = '';
    const frameHost = document.createElement('div');
    frameHost.style.cssText = `width:1280px;height:720px;position:relative;background:${transparent ? 'transparent' : (tweaks.canvasBg === 'transparent' ? '#ffffff' : tweaks.canvasBg)};font-family:${BUBBLE_FONT};`;
    stageEl.appendChild(frameHost);
    const root = ReactDOM.createRoot(frameHost);
    setStatus('Loading fonts…');
    try { await document.fonts.ready; } catch {}
    const zip = new JSZip();
    const folder = zip.folder('chat-overlay-frames');
    const renderAt = (t) => new Promise((resolve) => {
      root.render(<ChatScene time={t} tweaks={tweaks} timeline={timeline}/>);
      requestAnimationFrame(() => requestAnimationFrame(resolve));
    });
    try {
      for (let i = 0; i < totalFrames; i++) {
        if (cancelRef.current) { setStatus('Cancelled.'); break; }
        await renderAt(i / fps);
        const dataUrl = await htmlToImage.toPng(frameHost, { width:1280, height:720, pixelRatio:1, backgroundColor: transparent ? undefined : (tweaks.canvasBg === 'transparent' ? '#ffffff' : tweaks.canvasBg), cacheBust:false, skipFonts:false });
        folder.file(`frame_${String(i).padStart(4,'0')}.png`, dataUrl.split(',')[1], { base64:true });
        setProgress((i + 1) / totalFrames);
        setStatus(`Captured frame ${i + 1} of ${totalFrames}`);
      }
      if (!cancelRef.current) {
        setStatus('Zipping…');
        folder.file('README.txt',
          `Chat Streaming Overlay — PNG sequence\n\nFrames: ${totalFrames}   FPS: ${fps}   Resolution: 1280×720\nTransparent: ${transparent ? 'yes' : 'no'}\n\n` +
          `--- FCPX Import ---\nA) Drag the folder directly into FCPX as image sequence, or\nB) Wrap as ProRes 4444 with alpha:\n  brew install ffmpeg\n  ffmpeg -framerate ${fps} -i frame_%04d.png \\\n    -c:v prores_ks -profile:v 4444 -pix_fmt yuva444p10le \\\n    chat-overlay.mov\n`
        );
        folder.file('timeline.json', JSON.stringify({ fps, totalDuration:timeline.totalDuration, cues: timeline.messages.map(m => ({ id:m.id, side:m.side, soundAt: m.side==='user' ? m.start : (m.streamStart != null ? m.streamStart : m.start), text:m.text })) }, null, 2));
        const blob = await zip.generateAsync({ type:'blob', compression:'DEFLATE', compressionOptions:{ level:6 } }, (meta) => setStatus(`Zipping… ${Math.round(meta.percent)}%`));
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `chat-overlay-${totalFrames}f-${fps}fps.zip`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setStatus(`Done — ${totalFrames} frames exported.`);
      }
    } catch (err) {
      console.error(err); setStatus(`Error: ${err.message || err}`);
    } finally {
      root.unmount(); stageEl.innerHTML = ''; setRunning(false);
    }
  };

  return (
    <div style={{ position:'fixed', inset:0, zIndex:2000, background:'rgba(0,0,0,0.65)', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Inter, system-ui, sans-serif' }} onClick={() => !running && onClose()}>
      <div onClick={(e)=>e.stopPropagation()} style={{ width:460, background:'#17171a', color:'#f6f4ef', border:'1px solid rgba(255,255,255,0.1)', borderRadius:14, padding:22, display:'flex', flexDirection:'column', gap:14, boxShadow:'0 30px 80px rgba(0,0,0,0.6)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontSize:17, fontWeight:700 }}>Export PNG sequence</div>
          <button type="button" onClick={onClose} disabled={running} style={{ background:'transparent', border:'none', color:'rgba(246,244,239,0.6)', fontSize:18, cursor: running ? 'not-allowed' : 'pointer' }}>×</button>
        </div>
        <div style={{ fontSize:13, color:'rgba(246,244,239,0.65)', lineHeight:1.5 }}>Captures every frame at 1280×720 as transparent PNG. A <code>timeline.json</code> is included with chime cue timings.</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          <label style={{ display:'flex', flexDirection:'column', gap:4, fontSize:12 }}>
            <span style={{ opacity:0.7 }}>Frame rate</span>
            <select value={fps} onChange={(e)=>setFps(Number(e.target.value))} disabled={running} style={{ background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', color:'#f6f4ef', fontFamily:'inherit', fontSize:13, padding:'7px 8px', borderRadius:6 }}>
              <option value={24}>24 fps</option>
              <option value={30}>30 fps</option>
              <option value={60}>60 fps</option>
            </select>
          </label>
          <label style={{ display:'flex', flexDirection:'column', gap:4, fontSize:12 }}>
            <span style={{ opacity:0.7 }}>Duration</span>
            <div style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', color:'rgba(246,244,239,0.75)', fontSize:13, padding:'7px 8px', borderRadius:6, fontVariantNumeric:'tabular-nums' }}>{timeline.totalDuration.toFixed(2)}s · {totalFrames} frames</div>
          </label>
        </div>
        <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13 }}>
          <input type="checkbox" checked={transparent} onChange={(e)=>setTransparent(e.target.checked)} disabled={running}/>
          <span>Transparent background (recommended for overlay)</span>
        </label>
        {running && (
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            <div style={{ height:6, background:'rgba(255,255,255,0.08)', borderRadius:3, overflow:'hidden' }}>
              <div style={{ width:`${progress*100}%`, height:'100%', background:'oklch(72% 0.12 250)', transition:'width 120ms' }}/>
            </div>
            <div style={{ fontSize:12, color:'rgba(246,244,239,0.7)' }}>{status}</div>
          </div>
        )}
        {!running && status && <div style={{ fontSize:12, color:'rgba(246,244,239,0.7)' }}>{status}</div>}
        <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:4 }}>
          {running
            ? <button type="button" onClick={() => { cancelRef.current = true; }} style={btnSecondary}>Cancel</button>
            : <><button type="button" onClick={onClose} style={btnSecondary}>Close</button><button type="button" onClick={runExport} style={btnPrimary}>Export frames</button></>}
        </div>
      </div>
    </div>
  );
}
const btnPrimary = { background:'oklch(72% 0.12 250)', color:'#0a0a0a', border:'none', padding:'8px 14px', borderRadius:6, fontFamily:'inherit', fontSize:13, fontWeight:600, cursor:'pointer' };
const btnSecondary = { background:'rgba(255,255,255,0.06)', color:'#f6f4ef', border:'1px solid rgba(255,255,255,0.12)', padding:'8px 14px', borderRadius:6, fontFamily:'inherit', fontSize:13, cursor:'pointer' };

function WelcomeSplash({ onClose }) {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:2500, background:'radial-gradient(ellipse at top, #1a1f2e 0%, #0a0a0a 70%)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Inter, system-ui, sans-serif', color:'#f6f4ef', padding:'24px', overflow:'auto' }}>
      <div style={{ maxWidth:620, width:'100%', textAlign:'left' }}>
        <div style={{ display:'inline-flex', alignItems:'center', gap:10, background:'rgba(43,124,255,0.14)', border:'1px solid rgba(43,124,255,0.35)', color:'#8ab4ff', padding:'6px 12px', borderRadius:999, fontSize:12, fontWeight:600, letterSpacing:0.3, marginBottom:20 }}>
          <span style={{ width:6, height:6, borderRadius:999, background:'#2b7cff' }}/>
          MR CLARKE'S FILM TOOLKIT
        </div>
        <h1 style={{ margin:'0 0 12px', fontSize:44, lineHeight:1.05, fontWeight:700, letterSpacing:-0.8 }}>
          Textback<span style={{ color:'#8ab4ff' }}>.</span>
        </h1>
        <p style={{ margin:'0 0 28px', fontSize:17, lineHeight:1.55, color:'rgba(246,244,239,0.72)', maxWidth:540 }}>
          A messaging overlay for your films — type a conversation, tweak the look, then export a transparent PNG sequence you can drop straight onto your footage in any editor.
        </p>
        <div style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:12, padding:'20px 22px', marginBottom:24 }}>
          <div style={{ fontSize:11, letterSpacing:1.2, fontWeight:600, color:'rgba(246,244,239,0.5)', marginBottom:14 }}>HOW TO USE</div>
          {[
            ['1', 'Open Tweaks', 'Edit messages, names, colors, and avatars. Add "Not delivered" to any user message. Attach images to any message.'],
            ['2', 'Preview', 'Hit "Enable sound" to hear message tones. Press play/scrub to see the animation.'],
            ['3', 'Export frames', 'Click "Export frames" → choose FPS → download a zip of transparent PNGs.'],
            ['4', 'Drop into your edit', 'Import the PNG sequence into Premiere / FCP / DaVinci / CapCut as an image sequence, sync to your scene.'],
          ].map(([n, title, body]) => (
            <div key={n} style={{ display:'flex', gap:14, alignItems:'flex-start', padding:'10px 0' }}>
              <div style={{ flex:'0 0 28px', width:28, height:28, borderRadius:999, background:'#2b7cff', color:'#fff', fontWeight:700, fontSize:13, display:'flex', alignItems:'center', justifyContent:'center' }}>{n}</div>
              <div>
                <div style={{ fontSize:14, fontWeight:600, marginBottom:2 }}>{title}</div>
                <div style={{ fontSize:13, color:'rgba(246,244,239,0.65)', lineHeight:1.5 }}>{body}</div>
              </div>
            </div>
          ))}
        </div>
        <button type="button" onClick={onClose} style={{ background:'#2b7cff', color:'#fff', border:'none', padding:'14px 22px', borderRadius:10, fontFamily:'inherit', fontSize:15, fontWeight:600, cursor:'pointer', boxShadow:'0 8px 24px rgba(43,124,255,0.4)' }}>
          Start making overlays →
        </button>
        <div style={{ marginTop:18, fontSize:12, color:'rgba(246,244,239,0.4)' }}>Tip: Your conversation saves automatically. Refresh anytime.</div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [editMode, setEditMode] = React.useState(false);
  const [exportOpen, setExportOpen] = React.useState(false);
  const [started, setStarted] = React.useState(false);
  const [showWelcome, setShowWelcome] = React.useState(() => {
    try { return !localStorage.getItem('textback_welcomed'); } catch { return true; }
  });
  const dismissWelcome = () => {
    try { localStorage.setItem('textback_welcomed', '1'); } catch {}
    setShowWelcome(false);
  };
  const engineRef = React.useRef(null);
  if (!engineRef.current) engineRef.current = new SoundEngine();
  React.useEffect(() => { Object.assign(TWEAKS, tweaks); }, [tweaks]);

  const isStandalone = React.useMemo(() => { try { return window.parent === window; } catch { return true; } }, []);
  React.useEffect(() => {
    if (isStandalone) { setEditMode(true); return; }
    const onMsg = (e) => {
      const d = e.data; if (!d || !d.type) return;
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type:'__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, [isStandalone]);

  const timeline = React.useMemo(() => computeTimeline(tweaks.conversation, {
    charsPerSecond: tweaks.charsPerSecond, typingDelay: tweaks.typingDelay, streamDelay: tweaks.streamDelay,
  }), [tweaks.conversation, tweaks.charsPerSecond, tweaks.typingDelay, tweaks.streamDelay]);

  const handleEnableSound = (e) => {
    if (e && e.preventDefault) e.preventDefault();
    try {
      const eng = engineRef.current;
      const ctx = eng.ensure();
      if (!ctx) { setStarted(true); return; }
      eng.resume();
      if (started) {
        eng.setMuted(true);
        setTweaks(tw => ({ ...tw, soundOn: false }));
        setStarted(false);
      } else {
        eng.setVolume(tweaks.volume);
        eng.setMuted(false);
        eng.receive();
        setTweaks(tw => ({ ...tw, soundOn: true }));
        setStarted(true);
      }
    } catch (err) { console.error('toggle sound failed', err); }
  };

  return (
    <>
      <PreviewStage tweaks={tweaks} timeline={timeline} engine={engineRef.current}/>

      {/* Top-right buttons */}
      <div style={{ position:'fixed', top:16, right:16, zIndex:1500, display:'flex', gap:8 }}>
        <button type="button" onClick={handleEnableSound} style={{ background: started ? 'oklch(72% 0.12 250)' : '#17171a', color: started ? '#0a0a0a' : '#f6f4ef', border: started ? 'none' : '1px solid rgba(255,255,255,0.14)', padding:'10px 14px', borderRadius:8, fontFamily:'Inter, system-ui, sans-serif', fontSize:13, fontWeight:600, cursor:'pointer', boxShadow:'0 6px 16px rgba(0,0,0,0.35)', display:'flex', alignItems:'center', gap:8 }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 5v4h2l3 3V2L4 5H2z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/>
            <path d="M9 5c1 .5 1 3 0 4M11 3c2 1 2 7 0 8" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
          </svg>
          {started ? 'Sound on' : 'Enable sound'}
        </button>
        {isStandalone && (
          <button type="button" onClick={() => setEditMode(m => !m)} style={{ background:'#17171a', color:'#f6f4ef', border:'1px solid rgba(255,255,255,0.14)', padding:'10px 14px', borderRadius:8, fontFamily:'Inter, system-ui, sans-serif', fontSize:13, fontWeight:600, cursor:'pointer', boxShadow:'0 6px 16px rgba(0,0,0,0.35)' }}>
            {editMode ? 'Hide tweaks' : 'Show tweaks'}
          </button>
        )}
        <button type="button" onClick={() => setExportOpen(true)} style={{ background:'oklch(72% 0.12 250)', color:'#0a0a0a', border:'none', padding:'10px 14px', borderRadius:8, fontFamily:'Inter, system-ui, sans-serif', fontSize:13, fontWeight:600, cursor:'pointer', boxShadow:'0 6px 16px rgba(0,0,0,0.35)', display:'flex', alignItems:'center', gap:8 }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v9M3 6l4 4 4-4M1 13h12" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          Export frames
        </button>
      </div>

      {editMode && (
        <TweaksPanel initial={tweaks} onChange={setTweaks}
          onPlaySample={() => { engineRef.current.ensure(); engineRef.current.resume(); engineRef.current.receive(); }}/>
      )}

      <ExportModal open={exportOpen} onClose={() => setExportOpen(false)} tweaks={tweaks} timeline={timeline}/>

      {/* Top-left branding */}
      <button type="button" onClick={() => setShowWelcome(true)} title="About Textback" style={{ position:'fixed', top:16, left:16, zIndex:1500, background:'rgba(23,23,26,0.82)', color:'#f6f4ef', border:'1px solid rgba(255,255,255,0.14)', padding:'8px 12px', borderRadius:8, fontFamily:'Inter, system-ui, sans-serif', fontSize:12, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:8, backdropFilter:'blur(8px)' }}>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 3.5A1.5 1.5 0 0 1 3.5 2h7A1.5 1.5 0 0 1 12 3.5v5A1.5 1.5 0 0 1 10.5 10H6L3 12.5V10h-.5A1.5 1.5 0 0 1 1 8.5v-5" stroke="#8ab4ff" strokeWidth="1.3" strokeLinejoin="round"/>
        </svg>
        Textback<span style={{ color:'rgba(246,244,239,0.45)', fontWeight:400 }}>· by Mr Clarke</span>
      </button>

      {showWelcome && <WelcomeSplash onClose={dismissWelcome}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
